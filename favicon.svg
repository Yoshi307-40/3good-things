<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#3a1a9e"/>
      <stop offset="100%" stop-color="#150626"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#f4e3b8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f4e3b8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="42%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="55%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e0c98f"/>
    </radialGradient>
  </defs>

  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- soft glow -->
  <circle cx="32" cy="32" r="24" fill="url(#glow)"/>

  <!-- full moon -->
  <circle cx="32" cy="32" r="16" fill="url(#moon)"/>
  <!-- subtle craters -->
  <circle cx="26" cy="26" r="2.2" fill="#e0c98f" opacity="0.45"/>
  <circle cx="37" cy="30" r="1.4" fill="#e0c98f" opacity="0.4"/>
  <circle cx="30" cy="38" r="1.8" fill="#e0c98f" opacity="0.35"/>

  <!-- stars -->
  <circle cx="50" cy="14" r="1.4" fill="#e8d5a8"/>
  <circle cx="12" cy="46" r="1.2" fill="#8fa8d0"/>
  <circle cx="52" cy="46" r="1" fill="#c9a96e"/>
</svg>
